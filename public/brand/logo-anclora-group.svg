<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Anclora Group emblem">
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#1a202d"/>
      <stop offset="45%" stop-color="#0d1118"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf7ef"/>
      <stop offset="18%" stop-color="#d9d0c0"/>
      <stop offset="42%" stop-color="#8f97a7"/>
      <stop offset="62%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#657184"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="22%" stop-color="#c9c1b2"/>
      <stop offset="50%" stop-color="#8a93a3"/>
      <stop offset="74%" stop-color="#f2ede4"/>
      <stop offset="100%" stop-color="#667082"/>
    </linearGradient>
    <linearGradient id="metalAlt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ece7dd"/>
      <stop offset="25%" stop-color="#adb4bf"/>
      <stop offset="55%" stop-color="#f8f4eb"/>
      <stop offset="100%" stop-color="#7a8392"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.94 0 0 0 0 0.91 0 0 0 0 0.82 0 0 0 0.38 0" result="soft"/>
      <feMerge>
        <feMergeNode in="soft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="innerClip">
      <circle cx="256" cy="256" r="182"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="226" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.72"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="186" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <g clip-path="url(#innerClip)" filter="url(#glow)">
    <circle cx="256" cy="256" r="182" fill="url(#bg)"/>
    <path d="M120 213 C166 176 208 175 252 206 S336 246 394 204" fill="none" stroke="url(#metal)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M108 259 C160 223 210 223 256 255 S342 315 404 269" fill="none" stroke="url(#metalAlt)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M122 308 C170 274 218 276 261 307 S342 364 392 321" fill="none" stroke="url(#metal)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="256" cy="256" r="106" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.25"/>
    <circle cx="256" cy="256" r="76" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  </g>

  <circle cx="256" cy="256" r="182" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
